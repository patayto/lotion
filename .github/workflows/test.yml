name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Tests
      run: npm test
      env:
        AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'dummy-secret-for-tests-only' }}
        DATABASE_URL: "postgresql://johndoe:randompassword@localhost:5432/mydb?schema=public" # Dummy URL for build-time checking if needed
